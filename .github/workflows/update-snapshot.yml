name: Update snapshot

# Runs the pipeline on a schedule, writes docs/snapshot.json, and commits it
# if anything changed. Also runnable manually from the Actions tab.
#
# SETUP (one-time):
#   1. Repo Settings -> Secrets and variables -> Actions -> New repository
#      secret. Name: SGO_API_KEY. Value: your SportsGameOdds key.
#   2. Repo Settings -> Actions -> General -> Workflow permissions ->
#      "Read and write permissions" (needed so this workflow can push
#      the updated snapshot.json back to the repo).
#   3. Repo Settings -> Pages -> Source: "Deploy from a branch" ->
#      Branch: main, Folder: /docs.
#
# SCHEDULE: every 30 minutes. MLB games mostly start evening ET, so this
# is generous coverage without burning through SportsGameOdds' free-tier
# object budget (2,500/month) too fast. Adjust the cron below if you want
# it tighter or looser — cron times are UTC.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pipeline
        env:
          SGO_API_KEY: ${{ secrets.SGO_API_KEY }}
        run: |
          mkdir -p docs
          python pipeline.py --out docs/snapshot.json

      - name: Commit snapshot if changed
        run: |
          git config user.name "market-gap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/snapshot.json
          if git diff --staged --quiet; then
            echo "No changes to snapshot — skipping commit."
          else
            git commit -m "Update snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
